name: Build Ignition Edge Container (arm64)

# arm64 ONLY workflow — slow path via QEMU. Decoupled from amd64 so
# Pi nodes get an explicit :${VERSION}-arm64 tag without holding up
# the amd64 fast path that UT3 cp02 depends on.
#
# Pi consumers must pull the explicit tag:
#   podman pull ghcr.io/embernet-ai/ignition-edge:8.3.6-arm64
#
# We do NOT touch the canonical :main / :latest / :${VERSION} tags
# here — amd64 owns those (see build.yml). This keeps cp02's pull
# of :8.3.6 deterministic and fast.

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Containerfile'
      - '.github/workflows/build-arm64.yml'
  workflow_dispatch:
    inputs:
      ignition_version:
        description: 'Ignition Edge version (zip release tag without leading v)'
        required: true
        default: '8.3.6'

concurrency:
  group: ignition-build-arm64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 90

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: embernet-ai/ignition-edge
      IGNITION_VERSION: ${{ github.event.inputs.ignition_version || '8.3.6' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reclaim runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman jq

      - name: Login to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | podman login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Build arm64 image
        run: |
          podman build \
            --platform linux/arm64 \
            --build-arg IGNITION_VERSION="${IGNITION_VERSION}" \
            -t "${REGISTRY}/${IMAGE_NAME}:build-arm64" \
            -f Containerfile .

      - name: Smoke test (verify install layout + ignition user)
        run: |
          podman run --rm \
            --platform linux/arm64 \
            --entrypoint /bin/sh \
            "${REGISTRY}/${IMAGE_NAME}:build-arm64" \
            -c 'set -e; \
                id ignition; \
                test -x /usr/local/bin/ignition/ignition.sh; \
                test -x /usr/local/bin/ignition/ignition-util.sh; \
                test -x /usr/local/bin/ignition/ignition-gateway; \
                echo "ignition layout OK (arm64)"'

      - name: Push arm64-tagged image (:version-arm64 + :main-arm64)
        run: |
          for TAG in "${IGNITION_VERSION}-arm64" main-arm64; do
            REF="${REGISTRY}/${IMAGE_NAME}:${TAG}"
            podman tag "${REGISTRY}/${IMAGE_NAME}:build-arm64" "${REF}"
            podman push "${REF}" "docker://${REF}"
            echo "Pushed: ${REF}"
          done
